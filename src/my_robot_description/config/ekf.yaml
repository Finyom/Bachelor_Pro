ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # ── Quelle 0: Rad-Odometrie ─────────────────────────
    odom0: /diff_drive_base_controller/odom
    odom0_config: [
      true,  true,  false,
      false, false, true,
      true,  false, false,
      false, false, true,
      false, false, false
    ]
    odom0_queue_size: 10
    odom0_nodelay: true
    sensor_timeout: 0.5

